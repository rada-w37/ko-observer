name: Phase5 KO Observe Loop

on:
  workflow_dispatch:
    inputs:
      world_id:
        description: "mentemori API world_id"
        required: true
        default: "1001"
      duration_seconds:
        description: "Observe duration seconds"
        required: true
        default: "60"

jobs:
  phase5-ko-observe-loop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run Phase5 KO observe loop
        run: npm run start
        env:
          KOO_MODE: phase5-ko-observe-loop
          KOO_WORLD_ID: ${{ inputs.world_id }}
          KOO_OBSERVE_DURATION_SECONDS: ${{ inputs.duration_seconds }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
