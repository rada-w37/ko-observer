name: Phase6 Seed Dummy Guild KO Totals

on:
  workflow_dispatch:
    inputs:
      world_id:
        description: "mentemori API world_id"
        required: true
        default: "1037"
      clear:
        description: "Clear koObserverViews/guildKoTotals before seeding"
        required: true
        default: "true"

jobs:
  phase6-seed-dummy-guild-ko-totals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Seed dummy guild KO totals
        run: npm run start
        env:
          KOO_MODE: phase6-seed-dummy-guild-ko-totals
          KOO_WORLD_ID: ${{ inputs.world_id }}
          KOO_SEED_CLEAR: ${{ inputs.clear }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
